services:

  zipkin:
    container_name: zipkin
    image: openzipkin/zipkin:3.5
    ports:
      - "9411:9411"
    environment:
      ZIPKIN_UI_BASEPATH: /zipkin

  jaeger:
    container_name: jaeger
    image: jaegertracing/jaeger:2.14.1
    ports:
      # UI
      - "16686:16686"
      # OTLP HTTP
      - "4318:4318"
      # OTLP gRPC
      - "4317:4317"

  # connect from docker network:
  #   docker run -it --rm --network game-library_graylog mongo mongosh --host mongo -u admin -p password --authenticationDatabase admin test
  # connect outside of docker network:
  #   docker run -it --rm mongo mongosh --host 192.168.x.x -u admin -p password --authenticationDatabase admin test
  mongo:
    container_name: mongo
    image: mongo:8.2
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: graylog
    # not required with docker network
    # ports:
    #  - "27017:27017"
    restart: always
    volumes:
      - mongo_data:/data/db
    networks:
      - graylog

  opensearch:
    container_name: opensearch
    image: opensearchproject/opensearch:2.19.4
    environment:
      - cluster.name=graylog
      - node.name=graylog-opensearch
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      # Disable security plugin for simpler local development
      # Remove this line and configure security properly for production
      - DISABLE_SECURITY_PLUGIN=true
    restart: always
    deploy:
      resources:
        limits:
          memory: 1g
    # not required with docker network
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - graylog

  graylog:
    container_name: graylog
    image: graylog/graylog:7.0.4
    volumes:
      - graylog_data:/usr/share/graylog/data
    environment:
      - GRAYLOG_PASSWORD_SECRET=1234567890abcdef
      # admin:admin
      # echo -n "Enter Password: " && head -1 < /dev/stdin | tr -d '\n' | sha256sum | cut -d " " -f1
      - GRAYLOG_ROOT_PASSWORD_SHA2=8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918
      # https://go2docs.graylog.org/5-0/setting_up_graylog/server.conf.html
      - GRAYLOG_HTTP_EXTERNAL_URI=http://127.0.0.1:9000/
      # "if the public IP address of the server is 203.0.113.10 and the Graylog web interface is listening on port 9000,
      # the value should be set to http://203.0.113.10:9000/ "
      - GRAYLOG_HTTP_PUBLISH_URI=http://127.0.0.1:9000/
      - GRAYLOG_MONGODB_URI=mongodb://admin:password@mongo:27017/graylog?authSource=admin
      - GRAYLOG_ELASTICSEARCH_HOSTS=http://opensearch:9200
    entrypoint: /usr/bin/tini -- wait-for-it opensearch:9200 --  /docker-entrypoint.sh
    restart: always
    depends_on:
      - mongo
      - opensearch
    ports:
      # Graylog web interface and REST API
      - "9000:9000"
      # GELF UDP
      - "12201:12201/udp"
    networks:
      - graylog
        
  prometheus:
    container_name: prometheus
    image: prom/prometheus:v3.8.1
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - prometheus_data:/prometheus
    restart: always
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml

volumes:
  mongo_data:
    driver: local
  opensearch_data:
    driver: local
  graylog_data:
    driver: local
  prometheus_data:
    driver: local
    
configs:
  prometheus_config:
    content: |
      global:
        scrape_interval: 15s
        evaluation_interval: 15s
        scrape_timeout: 10s
      
      scrape_configs:
        - job_name: 'prometheus'
          static_configs:
            - targets: ['localhost:9090']
      
        - job_name: 'example-server'
          static_configs:
            - targets: ['host.docker.internal:8000']

networks:
  graylog:
    driver: bridge
